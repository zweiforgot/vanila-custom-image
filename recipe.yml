name: Zwei Vanilla Desktop
id: zwei
vibversion: 1.0.7

stages:
- id: build
  base: ghcr.io/vanilla-os/desktop:main
  addincludes: true
  singlelayer: false

  labels:
    maintainer: self-maintained

  args:
    DEBIAN_FRONTEND: noninteractive

  runs:
    commands:
      - echo 'APT::Install-Recommends "0";' > /etc/apt/apt.conf.d/01norecommends

  modules:

  - name: init
    type: shell
    commands:
      - lpkg --unlock
      - apt-get update

  - name: install-base-tools
    type: shell
    commands:
      - apt-get install -y curl wget gnupg ca-certificates lsb-release

  - name: install-sunshine
    type: shell
    commands:
      - wget https://github.com/LizardByte/Sunshine/releases/latest/download/sunshine-ubuntu-24.04-amd64.deb
      - apt-get install -y ./sunshine-ubuntu-24.04-amd64.deb
      - rm sunshine-ubuntu-24.04-amd64.deb

  - name: sunshine-runtime
    type: shell
    commands:
      - apt-get install -y udev dbus libdrm2 libgbm1 mesa-va-drivers vainfo

  - name: sunshine-permissions
    type: shell
    commands:
      - mkdir -p /etc/udev/rules.d
      - printf 'KERNEL=="uinput", MODE="0660", GROUP="input", OPTIONS+="static_node=uinput"\n' > /etc/udev/rules.d/85-sunshine.rules

  - name: docker-install
    type: shell
    commands:
      - install -m 0755 -d /etc/apt/keyrings
      - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
      - chmod a+r /etc/apt/keyrings/docker.asc
      - printf "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable\n" > /etc/apt/sources.list.d/docker.list
      - apt-get update
      - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  - name: install-wings
    type: shell
    commands:
      - mkdir -p /etc/pterodactyl
      - curl -L https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64 -o /usr/local/bin/wings
      - chmod +x /usr/local/bin/wings

  - name: wings-service
    type: shell
    commands:
      - mkdir -p /etc/systemd/system
      - printf "[Unit]\nDescription=Pterodactyl Wings\nAfter=docker.service\nRequires=docker.service\n\n[Service]\nUser=root\nWorkingDirectory=/etc/pterodactyl\nExecStart=/usr/local/bin/wings\nRestart=always\nLimitNOFILE=4096\n\n[Install]\nWantedBy=multi-user.target\n" > /etc/systemd/system/wings.service

  - name: panel-deploy
    type: shell
    commands:
      - mkdir -p /opt/pterodactyl
      - printf "version: 3\nservices:\n  panel:\n    image: ghcr.io/pterodactyl/panel:latest\n    restart: always\n    ports:\n      - \"8080:80\"\n    volumes:\n      - panel-data:/app/var\n    depends_on:\n      - database\n      - redis\n\n  database:\n    image: mariadb:10.5\n    restart: always\n    environment:\n      MYSQL_ROOT_PASSWORD: pterodactyl\n      MYSQL_DATABASE: panel\n      MYSQL_USER: pterodactyl\n      MYSQL_PASSWORD: pterodactyl\n    volumes:\n      - db-data:/var/lib/mysql\n\n  redis:\n    image: redis:alpine\n    restart: always\n\nvolumes:\n  panel-data:\n  db-data:\n" > /opt/pterodactyl/docker-compose.yml

  - name: install-cloudflare
    type: shell
    commands:
      - curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
      - chmod +x /usr/local/bin/cloudflared

  - name: cloudflare-service
    type: shell
    commands:
      - printf "[Unit]\nDescription=Cloudflare Tunnel\nAfter=network.target\n\n[Service]\nType=simple\nExecStart=/usr/local/bin/cloudflared tunnel --no-autoupdate run\nRestart=always\nRestartSec=5s\n\n[Install]\nWantedBy=multi-user.target\n" > /etc/systemd/system/cloudflared.service

  - name: firstboot-script
    type: shell
    commands:
      - printf "#!/bin/bash\n\ndocker compose -f /opt/pterodactyl/docker-compose.yml up -d || true\nsystemctl enable wings || true\nsystemctl enable docker || true\nsystemctl enable cloudflared || true\n" > /usr/local/bin/zwei-firstboot
      - chmod +x /usr/local/bin/zwei-firstboot

  - name: set-image-name-abroot
    type: includes
    includes:
      - modules/80-set-image-abroot-config.yml

  - name: cleanup
    type: shell
    commands:
      - apt-get autoremove -y
      - apt-get clean
      - rm -rf /var/lib/apt/lists/*
      - lpkg --lock

  - name: fsguard
    type: fsguard
    CustomFsGuard: false
    FsGuardLocation: "/usr/sbin/FsGuard"
    GenerateKey: true
    FilelistPaths: ["/usr/bin"]
    modules:
      - name: remove-prev-fsguard
        type: shell
        commands:
          - rm -rf /FsGuard
          - rm -f ./minisign.pub ./minisign.key
          - chmod +x /usr/sbin/init

  - name: cleanup2
    type: shell
    commands:
      - rm -rf /tmp/*
      - rm -rf /var/tmp/*