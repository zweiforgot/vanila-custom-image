name: Zwei Vanilla Desktop
id: zwei
vibversion: 1.0.7

stages:
- id: build
  base: ghcr.io/vanilla-os/desktop:main
  addincludes: true
  singlelayer: false
  labels:
    maintainer: self-maintained
  args:
    DEBIAN_FRONTEND: noninteractive

  runs:
    commands:
      - echo 'APT::Install-Recommends "1";' > /etc/apt/apt.conf.d/01norecommends

  modules:

  - name: init-setup
    type: shell
    commands:
      - lpkg --unlock
      - apt-get update

  # ----------------------------
  # Sunshine installation
  # ----------------------------
  - name: install-sunshine
    type: shell
    commands:
      - apt-get install -y wget udev dbus libdrm2 libgbm1 mesa-va-drivers vainfo
      - wget https://github.com/LizardByte/Sunshine/releases/latest/download/sunshine-ubuntu-24.04-amd64.deb
      - apt-get install -y ./sunshine-ubuntu-24.04-amd64.deb
      - rm sunshine-ubuntu-24.04-amd64.deb
      - mkdir -p /etc/udev/rules.d
      - echo 'KERNEL=="uinput", MODE="0660", GROUP="input", OPTIONS+="static_node=uinput"' > /etc/udev/rules.d/85-sunshine.rules
      - mkdir -p /etc/sunshine

  # ----------------------------
  # Docker installation (safe for sid)
  # ----------------------------
  - name: install-docker
    type: shell
    commands:
      - apt-get install -y ca-certificates curl gnupg lsb-release
      - mkdir -p /etc/apt/keyrings
      - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
      - chmod a+r /etc/apt/keyrings/docker.asc
      - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
      - apt-get update
      - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      - systemctl enable docker || true

  # ----------------------------
  # Deploy Pterodactyl panel + Wings from repo files
  # ----------------------------
  - name: deploy-pterodactyl-files
    type: shell
    commands:
      - mkdir -p /opt/pterodactyl
      - cp /sources/modules/pterodactyl/docker-compose.yml /opt/pterodactyl/docker-compose.yml
      - mkdir -p /etc/cloudflared
      - cp /sources/modules/cloudflared/config.yml /etc/cloudflared/config.yml

  - name: auto-start-wings
    type: shell
    commands:
      - systemctl enable wings || true

  # ----------------------------
  # Abroot config
  # ----------------------------
  - name: set-image-name-abroot
    type: includes
    includes:
      - modules/80-set-image-abroot-config.yml

  # ----------------------------
  # Cleanup
  # ----------------------------
  - name: cleanup
    type: shell
    commands:
      - apt-get autoremove -y
      - apt-get clean
      - lpkg --lock

  - name: fsguard
    type: fsguard
    CustomFsGuard: false
    FsGuardLocation: "/usr/sbin/FsGuard"
    GenerateKey: true
    FilelistPaths: ["/usr/bin"]
    modules:
      - name: remove-prev-fsguard
        type: shell
        commands:
          - rm -rf /FsGuard
          - rm -f ./minisign.pub ./minisign.key
          - chmod +x /usr/sbin/init

  - name: cleanup2
    type: shell
    commands:
      - rm -rf /tmp/*
      - rm -rf /var/tmp/*