name: Zwei Vanilla Desktop
id: zwei
vibversion: 1.0.7

stages:
- id: build
  base: ghcr.io/vanilla-os/desktop:main
  addincludes: false
  singlelayer: false
  labels:
    maintainer: self-maintained
  args:
    DEBIAN_FRONTEND: noninteractive

  runs:
    commands:
      - echo 'APT::Install-Recommends "1";' > /etc/apt/apt.conf.d/01norecommends

  modules:

  - name: init-setup
    type: shell
    commands:
      - lpkg --unlock
      - apt-get update

  # Sunshine installation
  - name: install-sunshine
    type: shell
    commands:
      - apt-get install -y wget
      - wget https://github.com/LizardByte/Sunshine/releases/latest/download/sunshine-ubuntu-24.04-amd64.deb
      - apt-get install -y ./sunshine-ubuntu-24.04-amd64.deb
      - rm sunshine-ubuntu-24.04-amd64.deb

  - name: sunshine-runtime-deps
    type: shell
    commands:
      - apt-get install -y udev dbus libdrm2 libgbm1 mesa-va-drivers vainfo

  - name: sunshine-input-permissions
    type: shell
    commands:
      - mkdir -p /etc/udev/rules.d
      - echo 'KERNEL=="uinput", MODE="0660", GROUP="input", OPTIONS+="static_node=uinput"' > /etc/udev/rules.d/85-sunshine.rules

  - name: enable-sunshine-service
    type: shell
    commands:
      - systemctl enable sunshine.service || true
      - mkdir -p /etc/sunshine

  # Docker installation
  - name: install-docker
    type: shell
    commands:
      - apt-get install -y ca-certificates curl gnupg lsb-release
      - mkdir -p /etc/apt/keyrings
      - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
      - chmod a+r /etc/apt/keyrings/docker.asc
      - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
      - apt-get update
      - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      - systemctl enable docker || true

  # Pterodactyl + Wings installation
  - name: install-pterodactyl
    type: shell
    commands:
      - apt-get install -y software-properties-common curl tar unzip jq
      - useradd -m -d /var/lib/pterodactyl pterodactyl || true
      - mkdir -p /var/www/pterodactyl
      - curl -Lo panel.tar.gz https://github.com/pterodactyl/panel/releases/download/v1.11.11/panel.tar.gz
      - tar -xzf panel.tar.gz -C /var/www/pterodactyl
      - rm panel.tar.gz
      - chown -R www-data:www-data /var/www/pterodactyl
      - chmod -R 755 /var/www/pterodactyl
      - apt-get install -y mariadb-server mariadb-client php-cli php-mbstring php-bcmath php-curl php-gd php-mysql php-xml composer
      - systemctl enable mariadb || true

  - name: install-wings
    type: shell
    commands:
      - curl -Lo /usr/local/bin/wings https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64
      - chmod +x /usr/local/bin/wings
      - systemctl enable wings || true
      - mkdir -p /etc/pterodactyl
      - chown pterodactyl:pterodactyl /etc/pterodactyl

  # Cloudflared installation
  - name: install-cloudflared
    type: shell
    commands:
      - curl -LO https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
      - dpkg -i cloudflared-linux-amd64.deb || apt-get install -f -y
      - rm cloudflared-linux-amd64.deb
      - systemctl enable cloudflared || true

  # Optional: image configuration
  - name: set-image-name-abroot
    type: shell
    commands:
      - echo "IMAGE_NAME=ZweiDesktop" > /etc/image-config

  # Cleanup
  - name: cleanup
    type: shell
    commands:
      - apt-get autoremove -y
      - apt-get clean
      - lpkg --lock
      - rm -rf /tmp/*
      - rm -rf /var/tmp/*

  # FsGuard
  - name: fsguard
    type: fsguard
    CustomFsGuard: false
    FsGuardLocation: "/usr/sbin/FsGuard"
    GenerateKey: true
    FilelistPaths: ["/usr/bin"]
    modules:
      - name: remove-prev-fsguard
        type: shell
        commands:
          - rm -rf /FsGuard
          - rm -f ./minisign.pub ./minisign.key
          - chmod +x /usr/sbin/init